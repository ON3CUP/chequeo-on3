<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ON3 Cup - Validador Definitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f3f4f6; }
        .input-on3 { background: transparent; border: none; color: white; font-weight: bold; text-transform: uppercase; width: 100%; font-size: 0.75rem; }
        .input-on3:focus { outline: none; }
        .perk-card { background: #0a0a0a; border: 1px solid #1f2937; display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 12px; min-height: 60px; position: relative; }
        .perk-icon { width: 44px; height: 44px; object-fit: contain; display: block; }
        .icon-empty { opacity: 0; }
        .dropdown-results { position: absolute; top: 100%; left: 0; right: 0; background: #111; border: 1px solid #333; z-index: 50; max-height: 200px; overflow-y: auto; border-radius: 0 0 12px 12px; display: none; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; transition: 0.2s; }
        .result-item:hover { background: #222; }
        .result-img { width: 30px; height: 30px; object-fit: contain; }
        .killer-portrait-container { background: #0a0a0a; border: 1px solid #1f2937; border-radius: 20px; overflow: hidden; width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; position: relative; }
        .killer-portrait { width: 100%; height: 100%; object-fit: cover; display: none; transition: 0.3s; }
        .killer-placeholder { color: #333; font-weight: 900; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-6xl font-black italic uppercase tracking-tighter text-white">ON3 <span class="text-red-600">CHECKER</span></h1>
            <p class="text-[10px] font-bold text-gray-500 tracking-[0.3em] uppercase">Tournament Engine v3.0</p>
        </div>
        <button onclick="resetBuild()" class="bg-red-600 hover:bg-red-700 text-white text-[10px] font-black uppercase px-6 py-3 rounded-full transition-all tracking-widest shadow-lg shadow-red-900/20">
            BORRAR TODO
        </button>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="space-y-4">
            <h2 class="text-xs font-black uppercase text-red-500 border-l-4 border-red-600 pl-3">1. ASESINO</h2>
            <div class="killer-portrait-container mb-4">
                <span id="killer-text" class="killer-placeholder">Selecciona Personaje</span>
                <img id="killer-img" src="" class="killer-portrait">
            </div>
            <select id="killer-select" class="w-full bg-[#0a0a0a] border border-gray-800 p-4 rounded-xl font-bold text-white uppercase text-sm focus:border-red-600 outline-none transition-colors" onchange="updateKillerPortrait(); validate();">
                <option value="">SELECCIONAR ASESINO...</option>
            </select>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <h2 class="text-xs font-black uppercase text-blue-500 border-l-4 border-blue-600 pl-3">2. CONFIGURACIÓN DE PERKS</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <div class="perk-card"><img id="img-p1" src="" class="perk-icon icon-empty"><input type="text" id="p1" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)"><div class="dropdown-results" id="res-p1"></div></div>
                    <div class="perk-card"><img id="img-p2" src="" class="perk-icon icon-empty"><input type="text" id="p2" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)"><div class="dropdown-results" id="res-p2"></div></div>
                    <div class="perk-card"><img id="img-p3" src="" class="perk-icon icon-empty"><input type="text" id="p3" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)"><div class="dropdown-results" id="res-p3"></div></div>
                    <div class="perk-card"><img id="img-p4" src="" class="perk-icon icon-empty"><input type="text" id="p4" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)"><div class="dropdown-results" id="res-p4"></div></div>
                </div>
                <div class="space-y-3">
                    <input id="a1" placeholder="ACCESORIO 1..." class="w-full bg-[#0a0a0a] border border-gray-800 p-4 rounded-lg text-xs font-bold uppercase text-white outline-none focus:border-blue-600">
                    <input id="a2" placeholder="ACCESORIO 2..." class="w-full bg-[#0a0a0a] border border-gray-800 p-4 rounded-lg text-xs font-bold uppercase text-white outline-none focus:border-blue-600">
                </div>
            </div>

            <div id="status-card" class="mt-6 p-8 bg-[#080808] border-2 border-gray-900 rounded-3xl">
                <div id="badge" class="inline-block px-4 py-1 rounded-full text-[9px] font-black uppercase bg-gray-800 mb-2 text-white">Estado</div>
                <div id="msg" class="text-sm font-bold uppercase italic text-gray-500">Completa la build para validar.</div>
                <div id="error-list" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA DE ASESINOS Y TIERS
        const killerData = {
            enfermera: { name: "ENFERMERA", tier: 1 }, deterioro: { name: "DETERIORO", tier: 1 }, pueblerino: { name: "EL PUEBLERINO", tier: 1 },
            dark_lord: { name: "THE DARK LORD", tier: 2 }, ghoul: { name: "GHOUL", tier: 2 }, krasue: { name: "KRASUE", tier: 2 }, singularidad: { name: "SINGULARIDAD", tier: 2 }, espiritu: { name: "ESPÍRITU", tier: 2 },
            animatronico: { name: "ANIMATRONICO", tier: 3 }, artista: { name: "ARTISTA", tier: 3 }, cenobita: { name: "CENOBITA", tier: 3 }, payaso: { name: "PAYASO", tier: 3 }, arponero: { name: "ARPONERO", tier: 3 }, demogorgon: { name: "DEMOGORGON", tier: 3 }, draga: { name: "DRAGA", tier: 3 }, pesadilla: { name: "PESADILLA", tier: 3 }, good_guy: { name: "GOOD GUY", tier: 3 }, adiestradora: { name: "ADIESTRADORA CANINA", tier: 3 }, cazadora: { name: "CAZADORA", tier: 3 }, caballero: { name: "CABALLERO", tier: 3 }, cerebro: { name: "CEREBRO", tier: 3 }, oni: { name: "ONI", tier: 3 }, plaga: { name: "PLAGA", tier: 3 }, verdugo: { name: "VERDUGO", tier: 3 }, traicionero: { name: "TRAICIONERO", tier: 3 }, mellizos: { name: "MELLIZOS", tier: 3 }, desconocido: { name: "DESCONOCIDO", tier: 3 }, liche: { name: "LICHE", tier: 3 }, xenomorfo: { name: "XENOMORFO", tier: 3 }, primero: { name: "PRIMERO", tier: 3 },
            doctor: { name: "DOCTOR", tier: 4 }, ghostface: { name: "GHOSTFACE", tier: 4 }, legion: { name: "LEGIÓN", tier: 4 }, myers: { name: "MYERS", tier: 4 }, nemesis: { name: "NÉMESIS", tier: 4 }, onryo: { name: "ONRYO", tier: 4 }, cerda: { name: "CERDA", tier: 4 }, comerciante: { name: "COMERCIANTE", tier: 4 }, espectro: { name: "ESPECTRO", tier: 4 },
            trampero: { name: "TRAMPERO", tier: 5 }, bruja: { name: "BRUJA", tier: 5 }, canibal: { name: "EL CANIBAL", tier: 5 }
        };

        // 2. BANEOS GLOBALES
        const globalBanned = ["Instinto Alienígena", "Hijo de la Luz", "Percepción Activada", "Barbacoa y Chile", "Bestia de Prey", "Murmullo amargo", "Golpe de Gracia", "Arrogancia tenebrosa", "Oscuridad Expuesta", "Interruptor del Hombre Muerto", "Candado", "Disolución", "Dominación", "Duda impuesta", "Unidos eternamente", "Amigos para siempre", "Veda abierta", "Oído para la maquinaria", "Limitaciones genéticas", "Acogida nefasta", "Avería", "Empleo disponible", "Maleficio: favor de sangre", "Maleficio: control de masas", "Maleficio: enfréntate a la oscuridad", "Maleficio: tierra embrujada", "Maleficio: mente colmena", "Maleficio: obertura del mal", "Maleficio: pentimento", "Maleficio: represalias", "Maleficio: la emoción de la caza", "Soberbia", "Codicia humana", "Noqueo", "Toque lánguido", "Acecho letal", "Influencia", "Aprendizaje de máquina", "Sin descanso", "Nadie es libre", "Sin escondite", "Miedo fantasmal", "Jugar con la comida", "Depredación", "Voraz", "Gancho flagelante: oleada de ira", "Gancho flagelante: brújula cerrada", "Gancho flagelante: santuario monstruoso", "Proyecto secreto", "Deslumbrado", "Anatomía superior", "Terminal", "¡PLAF!", "Arma definitiva", "Separación", "Imprevisto", "Mirada errante", "Sintonía con la urdimbre", "Tácticas de zanshin", "Nadie escapa de la muerte"];

        // 3. REGLAS INDIVIDUALES POR TIER/KILLER
        const tierBanned = {
            1: ["Agitación", "Acechador de ciervos", "Discordancia", "Sin salida", "Gancho flagelante: Dolor retumbante", "Espías de las sombras"],
            3: ["Apretón de Hierro", "Furia Ciega", "Toma una Decisión", "Supervisión"],
            4: [], 5: []
        };
        const killerSpecificBans = {
            dark_lord: ["Toma una Decisión", "Gancho flagelante: Dolor retumbante"],
            ghoul: ["Toma una Decisión", "Gancho flagelante: Dolor retumbante"],
            espiritu: ["Toma una Decisión", "Gancho flagelante: Dolor retumbante"],
            krasue: ["Toma una Decisión"],
            singularidad: ["Toma una Decisión"]
        };

        // 4. COMBOS GLOBALES
        const forbiddenCombos = [
            { perks: ["Resistente", "Furia Espiritual"], name: "PERSECUCIÓN" },
            { perks: ["Némesis", "Rencor"], name: "OBSESIÓN" },
            { perks: ["Maleficio: Nadie escapa de la muerte", "Sin salida"], name: "ENDGAME" },
            { perks: ["Maleficio: Ruina", "Maleficio: Destino desdichado"], name: "REGRESIÓN" }
        ];

        // 5. COMBOS POR TIER Y KILLER
        const tierForbiddenCombos = { 1: [{ perks: ["Pim, Pam, Pum", "Erupción"], name: "REGRESIÓN T1" }], 2: [], 3: [], 4: [], 5: [] };
        const killerSpecificCombos = { espiritu: [{ perks: ["Pim, Pam, Pum", "Erupción"], name: "REGRESIÓN (ESPÍRITU)" }] };

        const allGamePerks = ["Retrasa el reloj", "Proyecto secreto", "Maleficio: mente colmena", "Agitación", "Fuerza brutal", "Presencia perturbadora", "Sabueso de sangre", "Depredación", "Hijo de las sombras", "Resistente", "Hijo de la luz", "Manitas", "Tanatofobia", "Vocación de enfermera", "Aliento", "Lo mejor para el final", "Luz que agoniza", "Jugar con la comida", "Maleficio: devoradora de esperanza", "Maleficio: ruina", "Maleficio: el tercer sello", "Presencia abrumadora", "Monitorización y abuso", "Sobrecarga", "Barbacoa y chile", "Noqueo", "Muerte de franklin", "Bestia de prey", "Maleficio: nana de cazadora", "Instinto territorial", "Guardián de sangre", "Enfurecimiento", "Recuérdame", "Gancho flagelante: truco del verdugo", "Supervisión", "Toma una decisión", "Coulrofobia", "Pim, pam, pum", "Desconcierto", "Furia espiritual", "Maleficio: tierra embrujada", "Rencor", "Discordancia", "Furia ciega", "Doncella de hierro", "Intervención corrupta", "Terror contagioso", "Devoción oscura", "Soy todo oídos", "Temblores trepidantes", "Persecución furtiva", "Sobretensión", "Quebrantamentes", "Restricción cruel", "Tácticas de zanshin", "Eco sangriento", "Némesis", "Oído para la maquinaria", "Interruptor del hombre muerto", "Maleficio: represalias", "Imposición de penitencia", "Rastro de tormento", "Vínculo mortal", "Agarre del dragón", "Maleficio: inmortal", "Maleficio: favor de sangre", "Acaparadora", "Opresión", "Golpe de gracia", "Deslumbrado", "Maleficio: control de masas", "Sin escapatoria", "Acecho letal", "Histeria", "Erupción", "Acogida nefasta", "Gancho flagelante: dolor retumbante", "Maleficio: pentimento", "Gancho flagelante: oleada de ira", "Salmuera", "Tormenta vil", "Disolución", "Oscuridad expuesta", "Toque séptico", "Anatomía superior", "Percepción activa", "Terminal", "Sin escondite", "Maleficio: enfréntate a la oscuridad", "Soberbia", "Veda abierta", "¡PLAF!", "Influencia", "Limitaciones genéticas", "Duda impuesta", "Aprendizaje de máquina", "Arma definitiva", "Brutalidad veloz", "Instinto alienígena", "Maleficio: dos pueden jugar", "Amigos para siempre", "Pilas incluidas", "Separación", "Imprevisto", "Incompleto", "Sintonía con la urdimbre", "Toque lánguido", "Arrogancia tenebrosa", "Maleficio: destino desdichado", "Codicia humana", "Dominación", "Trueno ensordecedor", "Gancho flagelante: brújula cerrada", "Sin descanso", "Maleficio: solo hay miseria", "Unidos eternamente", "Nadie es libre", "Empleo disponible", "Miedo fantasmal", "Avería", "Voraz", "Mirada errante", "Maleficio: obertura del mal", "Acechador de ciervos", "Apretón de hierro", "Carnicero chapucero", "Desasosiego", "Esperanza destruida", "Espías de la sombra", "Gancho flagelante: heridas supurantes", "Gancho flagelante: santuario monstruoso", "Implacable", "Insidia", "Maleficio: la emoción de la caza", "Maleficio: nadie escapa de la muerte", "Maleficio: títere de la fortuna", "Murmullo amargo", "Murmullos", "Todo vale", "Sin salida"];

        function init() {
            const sel = document.getElementById('killer-select');
            for(let t=1; t<=5; t++) {
                let group = document.createElement('optgroup'); group.label = `TIER ${t}`;
                Object.keys(killerData).forEach(id => { if(killerData[id].tier === t) { let opt = document.createElement('option'); opt.value = id; opt.textContent = killerData[id].name; group.appendChild(opt); } });
                sel.appendChild(group);
            }
        }

        function updateKillerPortrait() {
            const id = document.getElementById('killer-select').value;
            const img = document.getElementById('killer-img');
            const placeholder = document.getElementById('killer-text');
            if (id) {
                const fileName = (id === 'nemesis') ? 'port_nemesis' : id;
                img.src = `img/${fileName}.png`; img.style.display = 'block'; placeholder.style.display = 'none';
                img.onerror = () => { img.src = 'img/placeholder_killer.png'; };
            } else { img.src = ''; img.style.display = 'none'; placeholder.style.display = 'block'; }
        }

        function cleanPath(str) {
            if (str.toLowerCase().trim() === "hijo de la luz") return "Lightborn";
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "_");
        }

        function showResults(input) {
            const val = input.value.toLowerCase();
            const resDiv = document.getElementById('res-' + input.id);
            resDiv.innerHTML = "";
            if (val.length < 1) { resDiv.style.display = "none"; return; }
            const filtered = allGamePerks.filter(p => p.toLowerCase().includes(val));
            if (filtered.length > 0) {
                resDiv.style.display = "block";
                filtered.forEach(p => {
                    const item = document.createElement('div'); item.className = "result-item";
                    item.innerHTML = `<img src="img/${cleanPath(p)}.png" class="result-img" onerror="this.src='img/placeholder.png'"> <span class="text-xs font-bold uppercase text-white">${p}</span>`;
                    item.onclick = () => { input.value = p; resDiv.style.display = "none"; validate(); };
                    resDiv.appendChild(item);
                });
            } else { resDiv.style.display = "none"; }
        }

        function validate() {
            const killerId = document.getElementById('killer-select').value;
            const perks = [1,2,3,4].map(n => document.getElementById(`p${n}`).value.trim());
            const perksLower = perks.map(p => p.toLowerCase().trim());
            
            perks.forEach((p, index) => {
                const img = document.getElementById(`img-p${index+1}`);
                if(p !== "") { img.src = "img/" + cleanPath(p) + ".png"; img.classList.remove('icon-empty'); img.onerror = () => { img.src = "img/placeholder.png"; }; }
                else { img.src = ""; img.classList.add('icon-empty'); }
            });

            let errors = [];
            if (killerId) {
                const tier = killerData[killerId].tier;
                const specificBans = killerSpecificBans[killerId] || tierBanned[tier] || [];

                perks.forEach(p => { if (p) {
                    const pLow = p.toLowerCase().trim();
                    if (globalBanned.some(gb => gb.toLowerCase().trim() === pLow)) errors.push(`BANEO GLOBAL: ${p.toUpperCase()}`);
                    if (specificBans.some(sb => sb.toLowerCase().trim() === pLow)) errors.push(`RESTRICCIÓN TIER ${tier}/PERSONAJE: ${p.toUpperCase()}`);
                }});

                forbiddenCombos.forEach(c => { if(c.perks.every(cp => perksLower.includes(cp.toLowerCase().trim()))) errors.push(`COMBO GLOBAL: ${c.name}`); });
                (tierForbiddenCombos[tier] || []).forEach(c => { if(c.perks.every(cp => perksLower.includes(cp.toLowerCase().trim()))) errors.push(`COMBO TIER ${tier}: ${c.name}`); });
                (killerSpecificCombos[killerId] || []).forEach(c => { if(c.perks.every(cp => perksLower.includes(cp.toLowerCase().trim()))) errors.push(`COMBO ESPECÍFICO: ${c.name}`); });
            } else if (perks.some(p => p !== "")) { errors.push("SELECCIONA UN ASESINO PRIMERO"); }

            updateUI(errors);
        }

        function updateUI(errors) {
            const badge = document.getElementById('badge');
            const list = document.getElementById('error-list');
            const msg = document.getElementById('msg');
            list.innerHTML = "";
            if(errors.length > 0) {
                badge.innerText = "ILEGAL"; badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black uppercase bg-red-900 text-white mb-2";
                msg.innerText = "Infracciones detectadas:";
                errors.forEach(e => { list.innerHTML += `<div class="text-red-500 text-[10px] font-black italic uppercase">• ${e}</div>`; });
            } else {
                badge.innerText = "LEGAL"; badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black uppercase bg-green-900 text-white mb-2";
                msg.innerText = "Configuración válida.";
            }
        }

        function resetBuild() {
            document.getElementById('killer-select').value = ""; updateKillerPortrait();
            [1,2,3,4].forEach(n => { document.getElementById('p' + n).value = ""; const img = document.getElementById('img-p' + n); img.src = ""; img.classList.add('icon-empty'); });
            document.getElementById('a1').value = ""; document.getElementById('a2').value = "";
            validate();
        }

        document.addEventListener('click', (e) => { if (!e.target.className.includes('input-on3')) { document.querySelectorAll('.dropdown-results').forEach(d => d.style.display = "none"); } });
        init();
    </script>
</body>
</html>
