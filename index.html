<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ON3 Cup - Validador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f3f4f6; }
        .input-on3 { background: transparent; border: none; color: white; font-weight: bold; text-transform: uppercase; width: 100%; font-size: 0.75rem; }
        .input-on3:focus { outline: none; }
        .perk-card { background: #0a0a0a; border: 1px solid #1f2937; display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 12px; min-height: 60px; position: relative; }
        .perk-icon { width: 44px; height: 44px; object-fit: contain; display: block; }
        .icon-empty { opacity: 0; }
        
        .dropdown-results { position: absolute; top: 100%; left: 0; right: 0; background: #111; border: 1px solid #333; z-index: 50; max-height: 200px; overflow-y: auto; border-radius: 0 0 12px 12px; display: none; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; transition: 0.2s; }
        .result-item:hover { background: #222; }
        .result-img { width: 30px; height: 30px; object-fit: contain; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-6xl font-black italic uppercase tracking-tighter text-white">ON3 <span class="text-red-600">CHECKER</span></h1>
        <button onclick="resetBuild()" class="bg-red-600 hover:bg-red-700 text-white text-[10px] font-black uppercase px-6 py-3 rounded-full transition-all tracking-widest">
            BORRAR BUILD RÁPIDO
        </button>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="space-y-4">
            <h2 class="text-xs font-black uppercase text-red-500 border-l-4 border-red-600 pl-3">1. ASESINO</h2>
            <select id="killer-select" class="w-full bg-[#0a0a0a] border border-gray-800 p-4 rounded-xl font-bold text-white uppercase" onchange="updateView()">
                <option value="">SELECCIONAR...</option>
            </select>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <h2 class="text-xs font-black uppercase text-blue-500 border-l-4 border-blue-600 pl-3">2. CONFIGURACIÓN</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <div class="perk-card" id="card-p1">
                        <img id="img-p1" src="" class="perk-icon icon-empty">
                        <input type="text" id="p1" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)">
                        <div class="dropdown-results" id="res-p1"></div>
                    </div>
                    <div class="perk-card" id="card-p2">
                        <img id="img-p2" src="" class="perk-icon icon-empty">
                        <input type="text" id="p2" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)">
                        <div class="dropdown-results" id="res-p2"></div>
                    </div>
                    <div class="perk-card" id="card-p3">
                        <img id="img-p3" src="" class="perk-icon icon-empty">
                        <input type="text" id="p3" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)">
                        <div class="dropdown-results" id="res-p3"></div>
                    </div>
                    <div class="perk-card" id="card-p4">
                        <img id="img-p4" src="" class="perk-icon icon-empty">
                        <input type="text" id="p4" placeholder="BUSCAR PERK..." class="input-on3" autocomplete="off" oninput="showResults(this)">
                        <div class="dropdown-results" id="res-p4"></div>
                    </div>
                </div>
                <div class="space-y-3">
                    <input id="a1" placeholder="ACCESORIO 1..." class="w-full bg-[#0a0a0a] border border-gray-800 p-4 rounded-lg text-xs font-bold uppercase text-white" oninput="validate()">
                    <input id="a2" placeholder="ACCESORIO 2..." class="w-full bg-[#0a0a0a] border border-gray-800 p-4 rounded-lg text-xs font-bold uppercase text-white" oninput="validate()">
                </div>
            </div>

            <div id="status-card" class="mt-6 p-8 bg-[#080808] border-2 border-gray-900 rounded-3xl">
                <div id="badge" class="inline-block px-4 py-1 rounded-full text-[9px] font-black uppercase bg-gray-800 mb-2">Estado</div>
                <div id="msg" class="text-sm font-bold uppercase italic text-gray-500">Completa la build.</div>
                <div id="error-list" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const killerData = { enfermera: { name: "Enfermera", tier: 1 }, deterioro: { name: "Deterioro", tier: 1 }, pueblerino: { name: "Pueblerino", tier: 1 }, singularidad: { name: "Singularidad", tier: 2 }, espiritu: { name: "Espíritu", tier: 2 }, darklord: { name: "Dark Lord", tier: 2 }, artista: { name: "Artista", tier: 3 }, cenobita: { name: "Cenobita", tier: 3 }, oni: { name: "Oni", tier: 3 }, wesker: { name: "Cerebro", tier: 3 }, ghostface: { name: "Ghostface", tier: 4 }, legion: { name: "Legión", tier: 4 }, nemesis: { name: "Némesis", tier: 4 }, trampero: { name: "Trampero", tier: 5 }, bruja: { name: "Bruja", tier: 5 }, canibal: { name: "Caníbal", tier: 5 } };
        const globalBanned = ["Hijo de la Luz", "Instinto Alienígena", "Percepción Activada", "Barbacoa y Chile", "Golpe de Gracia", "Oscuridad Expuesta", "Interruptor del Hombre Muerto", "Tierra Embrujada", "Pentimento", "Sin Escondite", "Jugar con la Comida", "Nadie Escapa de la Muerte"];
        
        const allGamePerks = ["Retrasa el reloj", "Proyecto secreto", "Maleficio: mente colmena", "Agitación", "Fuerza brutal", "Presencia perturbadora", "Sabueso de sangre", "Depredación", "Hijo de las sombras", "Resistente", "Hijo de la luz", "Manitas", "Tanatofobia", "Vocación de enfermera", "Aliento", "Lo mejor para el final", "Luz que agoniza", "Jugar con la comida", "Maleficio: devoradora de esperanza", "Maleficio: ruina", "Maleficio: el tercer sello", "Presencia abrumadora", "Monitorización y abuso", "Sobrecarga", "Barbacoa y chile", "Noqueo", "Muerte de franklin", "Bestia de presa", "Maleficio: nana de cazadora", "Instinto territorial", "Guardián de sangre", "Enfurecimiento", "Recuérdame", "Gancho flagelante: truco del verdugo", "Supervisión", "Toma una decisión", "Coulrofobia", "Pim, pam, pum", "Desconcierto", "Furia espiritual", "Maleficio: tierra embrujada", "Rencor", "Discordancia", "Furia ciega", "Doncella de hierro", "Intervención corrupta", "Terror contagioso", "Devoción oscura", "Soy todo oídos", "Temblores trepidantes", "Persecución furtiva", "Sobretensión", "Quebrantamentes", "Restricción cruel", "Tácticas de zanshin", "Eco sangriento", "Némesis", "Oído para la maquinaria", "Interruptor del hombre muerto", "Maleficio: represalias", "Imposición de penitencia", "Rastro de tormento", "Vínculo mortal", "Agarre del dragón", "Maleficio: inmortal", "Maleficio: favor de sangre", "Acaparadora", "Opresión", "Golpe de gracia", "Deslumbrado", "Maleficio: control de masas", "Sin escapatoria", "Acecho letal", "Histeria", "Erupción", "Acogida nefasta", "Gancho flagelante: dolor retumbante", "Maleficio: pentimento", "Gancho flagelante: oleada de ira", "Salmuera", "Tormenta vil", "Disolución", "Oscuridad expuesta", "Toque séptico", "Anatomía superior", "Percepción activa", "Terminal", "Sin escondite", "Maleficio: enfréntate a la oscuridad", "Soberbia", "Veda abierta", "¡PLAF!", "Influencia", "Limitaciones genéticas", "Duda impuesta", "Aprendizaje de máquina", "Arma definitiva", "Brutalidad veloz", "Instinto alienígena", "Maleficio: dos pueden jugar", "Amigos para siempre", "Pilas incluidas", "Separación", "Imprevisto", "Incompleto", "Sintonía con la urdimbre", "Toque lánguido", "Arrogancia tenebrosa", "Maleficio: destino desdichado", "Codicia humana", "Dominación", "Trueno ensordecedor", "Gancho flagelante: brújula cerrada", "Sin descanso", "Maleficio: solo hay miseria", "Unidos eternamente", "Nadie es libre", "Empleo disponible", "Miedo fantasmal", "Avería", "Voraz", "Mirada errante", "Maleficio: obertura del mal", "Acechador de ciervos", "Apretón de hierro", "Carnicero chapucero", "Desasosiego", "Esperanza destruida", "Espías de la sombra", "Gancho flagelante: heridas supurantes", "Gancho flagelante: santuario monstruoso", "Implacable", "Insidia", "Maleficio: la emoción de la caza", "Maleficio: nadie escapa de la muerte", "Maleficio: títere de la fortuna", "Murmullo amargo", "Murmullos", "Todo vale"];

        function init() {
            const sel = document.getElementById('killer-select');
            Object.keys(killerData).forEach(id => {
                let opt = document.createElement('option');
                opt.value = id;
                opt.textContent = killerData[id].name;
                sel.appendChild(opt);
            });
        }

        function cleanPath(str) {
            // Normalizamos para comparar sin importar mayúsculas o espacios extra
            const check = str.toLowerCase().trim();
            
            // Regla de oro para Hijo de la luz
            if (check === "hijo de la luz") {
                return "Lightborn";
            }
            
            // Lógica normal para el resto
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "_");
        }

        function showResults(input) {
            const val = input.value.toLowerCase();
            const resDiv = document.getElementById('res-' + input.id);
            resDiv.innerHTML = "";
            
            if (val.length < 1) {
                resDiv.style.display = "none";
                return;
            }

            const filtered = allGamePerks.filter(p => p.toLowerCase().includes(val));
            
            if (filtered.length > 0) {
                resDiv.style.display = "block";
                filtered.forEach(p => {
                    const fileName = cleanPath(p);
                    const item = document.createElement('div');
                    item.className = "result-item";
                    item.innerHTML = `<img src="img/${fileName}.png" class="result-img" onerror="this.src='img/placeholder.png'"> <span class="text-xs font-bold uppercase text-white">${p}</span>`;
                    item.onclick = () => selectPerk(input.id, p);
                    resDiv.appendChild(item);
                });
            } else {
                resDiv.style.display = "none";
            }
        }

        function selectPerk(inputId, perkName) {
            const input = document.getElementById(inputId);
            input.value = perkName;
            document.getElementById('res-' + inputId).style.display = "none";
            validate();
        }

        function resetBuild() {
            document.getElementById('killer-select').value = "";
            [1,2,3,4].forEach(n => {
                document.getElementById('p' + n).value = "";
                const img = document.getElementById('img-p' + n);
                img.src = "";
                img.classList.add('icon-empty');
            });
            document.getElementById('a1').value = "";
            document.getElementById('a2').value = "";
            validate();
        }

        function updateView() {
            validate();
        }

        function validate() {
            const perks = [1,2,3,4].map(n => document.getElementById(`p${n}`).value.trim());
            
            perks.forEach((p, index) => {
                const img = document.getElementById(`img-p${index+1}`);
                if(p !== "") {
                    const fileName = cleanPath(p);
                    img.src = "img/" + fileName + ".png";
                    img.classList.remove('icon-empty');
                    img.onerror = () => { img.src = "img/placeholder.png"; };
                } else {
                    img.src = "";
                    img.classList.add('icon-empty');
                }
            });

            let errors = [];
            perks.forEach(p => {
                if(p && globalBanned.some(gb => gb.toLowerCase() === p.toLowerCase())) errors.push(`BANEO GLOBAL: ${p.toUpperCase()}`);
            });
            
            updateUI(errors);
        }

        function updateUI(errors) {
            const badge = document.getElementById('badge');
            const list = document.getElementById('error-list');
            list.innerHTML = "";
            if(errors.length > 0) {
                badge.innerText = "Build Ilegal";
                badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black uppercase bg-red-900 text-red-100 mb-2";
                errors.forEach(e => { list.innerHTML += `<div class="text-red-500 text-[10px] font-black italic uppercase">• ${e}</div>`; });
            } else {
                badge.innerText = "Build Legal";
                badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black uppercase bg-green-900 text-green-100 mb-2";
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.className.includes('input-on3')) {
                document.querySelectorAll('.dropdown-results').forEach(d => d.style.display = "none");
            }
        });

        init();
    </script>
</body>
</html>
